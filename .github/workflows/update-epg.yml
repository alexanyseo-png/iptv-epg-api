name: Update EPG API

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Ignore the 18-hour freshness gate
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: epg-api-production
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build EPG API
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            python scripts/build_api.py --force
          else
            python scripts/build_api.py --min-age-hours 18
          fi

      - name: Detect generated changes
        id: generated
        shell: bash
        run: |
          if git diff --quiet -- public; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated API
        if: steps.generated.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "epg-api-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public
          git commit -m "Update EPG schedules"
          git push
